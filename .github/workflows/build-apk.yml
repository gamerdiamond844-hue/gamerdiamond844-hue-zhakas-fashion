name: Build ZHAKAS FASHION APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create temporary Flutter app project for build
        working-directory: frontend
        run: |
          rm -rf .flutter_build_temp
          mkdir .flutter_build_temp
          cd .flutter_build_temp
          flutter create --project-name zhakass_fashion .
          rm -rf lib assets pubspec.yaml
          cp -r ../lib .
          if [ -d ../assets ]; then
            cp -r ../assets .
          fi
          cp ../pubspec.yaml .

      - name: Get Flutter packages
        working-directory: frontend/.flutter_build_temp
        run: flutter pub get

      - name: Build Release APK
        working-directory: frontend/.flutter_build_temp
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhakas-fashion-release-apk
          path: frontend/.flutter_build_temp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
