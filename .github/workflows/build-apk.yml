name: Build ZHAKAS FASHION APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Android project files
        working-directory: frontend
        run: |
          flutter create --project-name zhakass_fashion --platforms android .

      - name: Set minSdkVersion for flutter_secure_storage
        working-directory: frontend/android/app
        run: |
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 21/' build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdk 21/' build.gradle

      - name: Get Flutter packages
        working-directory: frontend
        run: flutter pub get

      - name: Build Release APK
        working-directory: frontend
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhakas-fashion-release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
