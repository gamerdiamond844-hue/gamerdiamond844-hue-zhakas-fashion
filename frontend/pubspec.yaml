name: zhakass_fashion
description: ZHAKAS FASHION luxury e-commerce app
version: 1.0.0+1
publish_to: "none"
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.1.1
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  connectivity_plus: ^4.0.2
  flutter_spinkit: ^5.2.0
  image_picker: ^1.0.4
  video_player: ^2.8.1
  fl_chart: ^0.65.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
